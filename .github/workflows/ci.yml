name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: CI Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust Estable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config libssl-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libwayland-client0 \
            libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
            libvulkan-dev libdbus-1-dev \
            meson ninja-build nasm libdav1d-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace