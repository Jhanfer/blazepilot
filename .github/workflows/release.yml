name: Release Linux

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Rust + target gnu
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Compilar en modo Release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Renombrar binario
        id: rename
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          FILE="blazepilot-x86_64-unknown-linux-gnu-v${VERSION}"
          cp target/x86_64-unknown-linux-gnu/release/blazepilot "./$FILE"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Subir binario al Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.file }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}