[package]
name = "blazepilot"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "blazepilot"
path = "blaze-app/src/main.rs"

[dependencies]
eframe = { version = "0.33.3", features = ["glow"] }
egui = "0.33.3"
openssl = { version = "0.10", features = ["vendored"] }

dirs = "6.0.0"
once_cell = "1.19"
tokio = { version = "1", features = ["full"] }
lru = "0.16.3"
uuid = { version = "1.7", features = ["v4"] }
notify = "8.2.0"
directories = "6.0.0"
serde_json = "1.0.149"
serde = "1.0.228"
chrono = "0.4.44"
crossbeam-channel = "0.5.15"
trash = "5.2.5"
cfg-if = "1.0.4"
shell-words = "1.1.1"
freedesktop-icons = "0.4.0"
resvg = "0.47.0"
image = "0.25.10"
futures = "0.3.32"
mime_guess = "2.0.5"
fuzzy-matcher = "0.3.7"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
mimalloc = "0.1.48"
anyhow = "1.0.102"
zbus = "5.14.0"
udisks2 = "0.3.1"
libc = "0.2.183"
tokio-stream = "0.1.18"
users = "0.11.0"
which = "8.0.2"
self_update = "0.44.0"


[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
incremental = false

#[target.x86_64-unknown-linux-gnu]
#rustflags = ["-C", "link-arg=-fuse-ld=mold"]