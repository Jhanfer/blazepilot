[changelog]
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% set files = commits | map(attribute="id") | join(sep=",") %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**({{ commit.scope }})** {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }}\
 ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/Jhanfer/blazepilot/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat",                  group = "<!-- 0 -->🚀 Features"    },
    { message = "^fix",                   group = "<!-- 1 -->🐛 Bug fixes"   },
    { message = "^perf",                  group = "<!-- 2 -->⚡ Performance"  },
    { message = "^refactor",              group = "<!-- 3 -->🚜 Refactor"    },
    { message = "^style",                 group = "<!-- 4 -->🎨 Estilo"      },
    { message = "^doc",                   group = "<!-- 5 -->📚 Docs"        },
    { message = "^test",                  group = "<!-- 6 -->🧪 Tests"       },
    { message = "^chore\\(release\\):",   skip  = true                       },
    { message = "^chore\\(deps.*\\)",     skip  = true                       },
    { message = "^chore|^ci",             group = "<!-- 7 -->⚙️ Miscelánea"  },
    { body    = ".*security",             group = "<!-- 8 -->🛡️ Seguridad"   },
    { message = "^revert",                group = "<!-- 9 -->◀️ Revert"      },
]

commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/Jhanfer/blazepilot/issues/${2}))" },
]

link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/Jhanfer/blazepilot/issues/$1" },
]